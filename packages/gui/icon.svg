<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338ca" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="100" ry="100" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Top shine -->
  <rect x="24" y="24" width="464" height="232" rx="100" ry="100" fill="url(#shine)"/>

  <!-- Film strip left -->
  <g opacity="0.85">
    <rect x="76" y="110" width="52" height="292" rx="10" fill="none" stroke="white" stroke-width="5"/>
    <rect x="90" y="130" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="160" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="190" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="220" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="250" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="280" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="310" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="340" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="90" y="370" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
  </g>

  <!-- Film strip right -->
  <g opacity="0.85">
    <rect x="384" y="110" width="52" height="292" rx="10" fill="none" stroke="white" stroke-width="5"/>
    <rect x="398" y="130" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="160" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="190" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="220" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="250" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="280" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="310" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="340" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="398" y="370" width="24" height="14" rx="3" fill="white" opacity="0.7"/>
  </g>

  <!-- Central M letter formed by geometric shapes -->
  <g filter="url(#glow)">
    <!-- M left leg -->
    <path d="M168 370 L168 168 L230 300 Z" fill="white" opacity="0.95"/>
    <!-- M right leg -->
    <path d="M344 370 L344 168 L282 300 Z" fill="white" opacity="0.95"/>
    <!-- M peak connector -->
    <path d="M168 168 L256 280 L344 168" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Rename arrow at bottom -->
  <g opacity="0.9">
    <path d="M210 420 L302 420" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <path d="M290 406 L310 420 L290 434" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
