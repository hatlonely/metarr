appId: com.metarr.app
productName: Metarr
copyright: Copyright © 2025 hatlonely
electronVersion: 35.0.0

directories:
  output: release

files:
  - dist/**/*
  - package.json
  - node_modules/@metarr/**/*

extraMetadata:
  main: dist/main/main.mjs

buildDependenciesFromSource: false

mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip

win:
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
