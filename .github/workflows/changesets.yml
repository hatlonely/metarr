name: Changesets

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: node -e "require('fs').rmSync('package-lock.json',{force:true})"
      - run: npm install

      - name: Build packages
        run: npm run build --workspace=packages/core --workspace=packages/cli

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          publish: npm publish --workspace=packages/core --workspace=packages/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node -e "require('fs').rmSync('package-lock.json',{force:true})"
      - run: npm install

      - name: Build
        run: npm run build --workspace=packages/core --workspace=packages/cli

      - name: Test
        run: npm run test --workspaces

      - name: TypeCheck
        run: npm run typecheck --workspaces
