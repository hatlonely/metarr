name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - 'packages/web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node -e "require('fs').rmSync('package-lock.json',{force:true})"
      - run: npm install

      - name: Build Web
        run: npm run build:web

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy packages/web/dist --project-name=metarr
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
